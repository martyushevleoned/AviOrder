<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="ru">
<head>
    <title>Order Page</title>
    <link th:href="@{/css/order.css}" rel="stylesheet" />
    <script type="text/javascript" th:src="@{/js/script.js}"></script>
</head>
<body>
<input th:value="${id}" id="orderId" type="hidden"/>
<header>
    <div><span>Идентификатор заказа: </span><span th:text="${id}"></span></div>
</header>
<div class="wrapper">
    <table>
        <tr>
            <td><span>ссылка на объявление</span></td>
            <td><span>количество пф в день</span></td>
            <td><span>дата начала</span></td>
            <td><span>дата конца</span></td>
            <td><span>стоимость в день</span></td>
            <td><span>стоимость за промежуток</span></td>
            <td><span>убрать объявление</span></td>
        </tr>
        <tr th:each="link : ${links}" class="link">
            <td><label><input type="text" th:value="${link.link}" placeholder="ссылка"></label></td>
            <td><label><input type="number" th:value="${link.pfCount}"></label></td>
            <td><label><input type="date" th:value="${link.startDate}"></label></td>
            <td><label><input type="date" th:value="${link.endDate}"></label></td>
            <td><label><input type="number" readonly></label></td>
            <td><label><input type="number" readonly></label></td>
            <td><button>убрать объявление</button></td>
        </tr>
    </table>
</div>
<footer>
    <div><button class="addLink">добавить объявление</button></div>
    <div><button class="save">сохранить</button></div>
    <div><span>Итоговая стоимость: </span><label><input class="summary" type="number" value="0" readonly></label></div>
</footer>
</body>
</html>
<script>
    // Обновляет значения автоопределяемых полей
    function updateCosts (){
        var links = document.querySelectorAll("tr.link");
        var sumPerPeriod = 0;

        links.forEach(link => {
            var pfCount = link.children[1].children[0].children[0];
            var startDate = link.children[2].children[0].children[0];
            var endDate = link.children[3].children[0].children[0];
            var costPerDay = link.children[4].children[0].children[0];
            var costPerPeriod = link.children[5].children[0].children[0];

            var countOfDays = Math.round((new Date(endDate.value).getTime() - new Date(startDate.value).getTime()) / (1000 * 60 * 60 * 24) + 1);
            costPerDay.value = pfCount.value * 4;
            costPerPeriod.value = costPerDay.value * countOfDays;

            sumPerPeriod += Number(costPerPeriod.value);
        });
        document.querySelector("input.summary").value = sumPerPeriod;
    }

    // устанавливает листенеры изменения количества ПФ, дат и кнопок удаления
    function setTableUpdateListeners() {
        var links = document.querySelectorAll("tr.link");
        links.forEach(link => {
            var pfCount = link.children[1].children[0].children[0];
            var startDate = link.children[2].children[0].children[0];
            var endDate = link.children[3].children[0].children[0];
            var button = link.children[6].children[0];

            pfCount.addEventListener("change", updateCosts);
            startDate.addEventListener("change", updateCosts);
            endDate.addEventListener("change", updateCosts);

            button.addEventListener('click', function (event) {
                link.remove();
                updateCosts();
            });
        });
    }

    // устанавливает листенер добавления ссылки
    function setButtonsUpdateListeners() {
        const button = document.querySelector('button.addLink');
        button.addEventListener('click', function (event) {

            var currentDate = new Date().toLocaleDateString('en-CA');
            var tr = document.createElement('tr');
            tr.className = "link";
            tr.innerHTML = `
                <td><label><input type="text" value="" placeholder="ссылка"></label></td>
                <td><label><input type="number" value="1"></label></td>
                <td><label><input type="date" value="${currentDate}"></label></td>
                <td><label><input type="date" value="${currentDate}"></label></td>
                <td><label><input type="number" readonly></label></td>
                <td><label><input type="number" readonly></label></td>
                <td><button>убрать объявление</button></td>
                `;

            var table = document.querySelector("tbody");
            table.appendChild(tr);

            updateCosts();
            setTableUpdateListeners();
        });
    }

    // устанавливает листенер добавления ссылки
    function initSaveButton() {
        const button = document.querySelector('button.save');
        button.addEventListener('click', function (event) {

            var body = {
                orderId: document.getElementById('orderId').value,
                linkDtoList: []
            };

            var links = document.querySelectorAll("tr.link");
            links.forEach(link => {
                var advertisment = link.children[0].children[0].children[0];
                var pfCount = link.children[1].children[0].children[0];
                var startDate = link.children[2].children[0].children[0];
                var endDate = link.children[3].children[0].children[0];

                body.linkDtoList.push({
                    link: advertisment.value,
                    pfCount: pfCount.value,
                    startDate: startDate.value,
                    endDate: endDate.value
                });
            });
            saveOrderData(body);
        });
    }

    initSaveButton();
    updateCosts();
    setTableUpdateListeners();
    setButtonsUpdateListeners();
</script>
